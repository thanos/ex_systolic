name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"
            primary: false
          - elixir: "1.19"
            otp: "28"
            primary: true
          - elixir: "1.20"
            otp: "29"
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache Mix tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.mix
            ~/.hex
          key: mix-tools-${{ runner.os }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ steps.setup-beam.outputs.otp-version }}

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: deps-${{ runner.os }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.setup-beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Check formatting
        if: matrix.primary
        run: mix format --check-formatted

      - name: Run credo
        run: mix credo --strict

      - name: Run dialyzer
        run: mix dialyzer

      - name: Run tests with coverage (local)
        if: ${{ !matrix.primary }}
        run: mix coveralls

      - name: Run tests with coverage (Coveralls)
        if: matrix.primary
        run: mix coveralls.github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIX_ENV: test

      - name: Audit dependencies
        run: mix deps.audit

  build-docs:
    name: Build docs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: setup-beam
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Cache Mix tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.mix
            ~/.hex
          key: mix-tools-${{ runner.os }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ steps.setup-beam.outputs.otp-version }}

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-1.19-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-1.19-

      - name: Install dependencies
        run: mix deps.get

      - name: Build docs
        run: mix docs
